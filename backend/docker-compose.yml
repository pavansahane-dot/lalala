version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: vpn_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: vpndb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: