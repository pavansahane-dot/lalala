version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PORT=5000
    depends_on:
      - db
      - redis
    networks:
      - vpn-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vpn_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - vpn-network

  db:
    image: postgres:14-alpine
    container_name: vpn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vpndb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpn-network

  redis:
    image: redis:7-alpine
    container_name: vpn_redis
    restart: unless-stopped
    networks:
      - vpn-network

volumes:
  postgres_data:

networks:
  vpn-network:
    driver: bridge
