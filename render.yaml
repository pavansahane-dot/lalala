services:
  # Backend API
  - type: web
    name: vpn-backend
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vpn-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vpn-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: APP_URL
        value: https://vpn-frontend.onrender.com
      - key: WG_SERVER_IP
        value: 100.53.134.149:46577
      - key: WG_SERVER_PUBLIC_KEY
        value: gKMc95i/cxCWYXFIa6FdnGMM+x6v14tJTWEJ4jNQGzo=

  # Frontend Static Site
  - type: web
    name: vpn-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://vpn-backend.onrender.com

databases:
  - name: vpn-database
    databaseName: vpndb
    user: vpnadmin
    region: singapore
    plan: free

  - name: vpn-redis
    region: singapore
    plan: free
